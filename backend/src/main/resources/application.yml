diwana:
  mode: dev
  version: 2606081559
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.together.ai/v1}
    model: ${OPENAI_MODEL:google/gemma-4-31B-it}

spring:
  application:
    name: diwana

  datasource:
    url: jdbc:h2:file:./data/diwana-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  sql:
    init:
      mode: always

server:
  port: 8080
  tomcat:
    connection-timeout: 600000  # 10 min — VLM calls can take minutes

logging:
  level:
    com.diwana: DEBUG
